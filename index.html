<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Expiry Tracker - Never Lose Your Data!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    :root { --primary: #00A651; --secondary: #FF6B00; --dark: #1a1a2e; --light: #f5f5f5; --white: #ffffff; --gray: #666; --success: #00C853; --warning: #FFC107; --danger: #FF5252; --gold: #FFD700; }
    body { background: linear-gradient(135deg, #001A75 0%, #0033CC 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 80px; }
    
    /* Brand Header - Outside the card */
    .brand-header { text-align: center; margin-bottom: 15px; width: 100%; max-width: 500px; }
    .brand-header .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3); }
    .brand-header .tagline { font-size: 0.7rem; color: rgba(255,255,255,0.8); margin-top: 3px; letter-spacing: 2px; text-transform: uppercase; }
    
    .container { background: var(--white); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%; overflow: hidden; }
    .header { background: var(--dark); color: var(--white); padding: 25px; text-align: center; }
    .header h1 { font-size: 1.5rem; margin-bottom: 5px; }
    .header .subtitle { color: var(--primary); font-size: 0.9rem; }
    .tabs { display: flex; background: var(--light); border-bottom: 1px solid #eee; }
    .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; color: var(--gray); transition: all 0.3s; }
    .tab.active { color: var(--primary); background: var(--white); border-bottom: 3px solid var(--primary); }
    .content { padding: 20px; padding-bottom: 30px; }
    .data-list { display: flex; flex-direction: column; gap: 15px; }
    .data-card { background: var(--light); border-radius: 15px; padding: 20px; border-left: 5px solid var(--primary); animation: fadeIn 0.3s ease; }
    .data-card.warning { border-left-color: var(--warning); }
    .data-card.danger { border-left-color: var(--danger); }
    .data-card .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .data-card .network { font-weight: bold; font-size: 1.1rem; color: var(--dark); }
    .data-card .data-amount { background: var(--primary); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .data-card .phone { color: var(--gray); font-size: 0.9rem; margin-bottom: 10px; }
    .data-card .expiry-row { display: flex; justify-content: space-between; align-items: center; }
    .data-card .countdown { font-size: 1.3rem; font-weight: bold; }
    .data-card .countdown.warning { color: var(--warning); }
    .data-card .countdown.danger { color: var(--danger); }
    .data-card .expiry-date { font-size: 0.85rem; color: var(--gray); }
    .data-card .actions { margin-top: 15px; display: flex; gap: 10px; }
    .btn { padding: 10px 20px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-primary { background: var(--primary); color: white; flex: 1; }
    .btn-danger { background: var(--danger); color: white; }
    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .add-form { display: none; }
    .add-form.active { display: block; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.9rem; color: var(--gray); margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .empty-state { text-align: center; padding: 40px; color: var(--gray); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 15px; }
    .total-summary { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-around; border-radius: 15px; margin-bottom: 20px; }
    .summary-item { text-align: center; }
    .summary-item .number { font-size: 1.5rem; font-weight: bold; }
    .summary-item .label { font-size: 0.75rem; opacity: 0.8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .notification-banner { background: var(--warning); color: var(--dark); padding: 15px; text-align: center; font-weight: 600; display: none; }
    .notification-banner.show { display: block; }
    .exact-time { font-size: 0.8rem; color: var(--gray); margin-top: 5px; }
    .footer { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4a 100%); padding: 15px 20px; text-align: center; border-top: 2px solid var(--gold); z-index: 100; }
    .footer a { color: var(--gold); text-decoration: none; font-weight: 600; transition: all 0.3s; }
    .footer a:hover { color: #fff; text-shadow: 0 0 10px var(--gold); }
    .footer .copyright { font-size: 0.75rem; color: #888; margin-top: 5px; }
    .footer .brand-name { font-weight: 700; letter-spacing: 1px; }
  </style>
</head>
<body>
  <!-- Brand Header - Outside the card -->
  <div class="brand-header">
    <div class="brand">✦ Dammie Optimus Solutions ✦</div>
    <div class="tagline">Premium Digital Solutions</div>
  </div>
  
  <div class="container">
    <div class="notification-banner" id="notificationBanner">⚠️ Some data plans are expiring soon!</div>
    <div class="header">
      <h1>📱 Data Expiry Tracker</h1>
      <p class="subtitle">Never lose your data again!</p>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('list')">My Data 📊</div>
      <div class="tab" onclick="showTab('add')">Add New ➕</div>
    </div>
    <div class="content">
      <div id="listView" class="data-list-view">
        <div class="total-summary" id="summary" style="display: none;">
          <div class="summary-item"><div class="number" id="totalData">0</div><div class="label">Total Data</div></div>
          <div class="summary-item"><div class="number" id="expiringSoon">0</div><div class="label">Expiring Soon</div></div>
        </div>
        <div id="dataList" class="data-list"></div>
      </div>
      <div id="addView" class="add-form">
        <div class="form-group">
          <label>Network Provider</label>
          <select id="network"><option value="MTN">MTN</option><option value="Airtel">Airtel</option><option value="Glo">Glo</option><option value="9mobile">9mobile</option></select>
        </div>
        <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" placeholder="e.g., 07053331253"></div>
        <div class="form-row">
          <div class="form-group"><label>Data Amount</label><input type="text" id="dataAmount" placeholder="e.g., 2.5GB"></div>
          <div class="form-group"><label>Cost (₦)</label><input type="number" id="cost" placeholder="e.g., 500"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Purchase Date</label><input type="date" id="purchaseDate"></div>
          <div class="form-group"><label>Purchase Time</label><input type="time" id="purchaseTime"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Validity (days)</label><input type="number" id="validity" placeholder="e.g., 30"></div>
          <div class="form-group">
            <label>Remind Me</label>
            <select id="reminderTime">
              <option value="1">1 hour before</option>
              <option value="3">3 hours before</option>
              <option value="6">6 hours before</option>
              <option value="12">12 hours before</option>
              <option value="24" selected>1 day before</option>
              <option value="48">2 days before</option>
              <option value="72">3 days before</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Plan Name (optional)</label><input type="text" id="planName" placeholder="e.g., GloCafe Special"></div>
        <button class="btn btn-primary" onclick="addData()">➕ Add Data Plan</button>
      </div>
    </div>
  </div>

  <!-- Premium Footer -->
  <div class="footer">
    <a href="https://dammieoptimus.github.io/tgrstartnow/?d=eyJyZWYiOiJEYW1taWVPcHRpbXVzMiIsIm5hbWUiOiJEYW1taWUgKE9wdGltdXMpIEF5b2RlbGUiLCJwaG9uZSI6IjA4MDI4OTc1ODE2IiwicGljIjoiaHR0cHM6Ly9pLmltZ3VyLmNvbS9xcVVFNGFyLmpwZyJ9" target="_blank">
      <span class="brand-name">Dammie Optimus Solutions</span>
    </a>
    <div class="copyright">© <span id="year"></span> Dammie Optimus Solutions. All rights reserved.</div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    let dataPlans = JSON.parse(localStorage.getItem('dataPlans')) || [];
    if (dataPlans.length === 0) {
      dataPlans.push({ id: Date.now(), network: 'Glo', phone: '07053331253', dataAmount: '2.5GB', cost: 500, purchaseDate: '2026-03-01', purchaseTime: '03:12', validity: 2, planName: 'GloCafe Special', reminderHours: 24 });
      saveData();
    }
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('purchaseDate').valueAsDate = new Date();
    document.getElementById('purchaseTime').value = `${hours}:${minutes}`;

    function saveData() { localStorage.setItem('dataPlans', JSON.stringify(dataPlans)); renderList(); }

    function calculateExpiry(purchaseDate, purchaseTime, validity) {
      const purchase = new Date(purchaseDate + 'T' + purchaseTime);
      const expiry = new Date(purchase);
      expiry.setDate(expiry.getDate() + parseInt(validity));
      return expiry;
    }

    function getTimeRemaining(expiryDate) {
      const now = new Date();
      const expiry = new Date(expiryDate);
      const diff = expiry - now;
      if (diff <= 0) return { expired: true, text: 'EXPIRED' };
      const totalHours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      if (totalHours < 24) return { expired: false, text: `${totalHours}h ${minutes}m left`, urgent: true };
      const days = Math.floor(totalHours / 24);
      const remainingHours = totalHours % 24;
      return { expired: false, text: `${days}d ${remainingHours}h left`, urgent: days < 2 };
    }

    function formatDateTime(date) { return new Date(date).toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    function getNetworkColor(network) { const colors = { 'MTN': '#FFB800', 'Airtel': '#0096D6', 'Glo': '#001A75', '9mobile': '#00A651' }; return colors[network] || '#666'; }

    function renderList() {
      const list = document.getElementById('dataList');
      const summary = document.getElementById('summary');
      if (dataPlans.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">📱</div><p>No data subscriptions yet.</p><p>Tap "Add New" to add your first data plan!</p></div>';
        summary.style.display = 'none'; return;
      }
      summary.style.display = 'flex';
      let totalExpiring = 0;
      list.innerHTML = dataPlans.map(plan => {
        const expiry = calculateExpiry(plan.purchaseDate, plan.purchaseTime, plan.validity);
        const timeLeft = getTimeRemaining(expiry);
        if (!timeLeft.expired && timeLeft.urgent) totalExpiring++;
        if (timeLeft.expired) totalExpiring++;
        let statusClass = timeLeft.expired ? 'danger' : (timeLeft.urgent ? 'warning' : '');
        return `
          <div class="data-card ${statusClass}">
            <div class="header-row">
              <span class="network" style="color: ${getNetworkColor(plan.network)}">${plan.network}</span>
              <span class="data-amount">${plan.dataAmount}</span>
            </div>
            <div class="phone">📱 ${plan.phone}</div>
            <div class="expiry-row">
              <span class="countdown ${statusClass}">${timeLeft.text}</span>
              <span class="expiry-date">${timeLeft.expired ? 'Expired!' : 'Expires: ' + formatDateTime(expiry)}</span>
            </div>
            ${plan.planName ? `<div class="exact-time">📋 ${plan.planName} (₦${plan.cost}) | Remind: ${plan.reminderHours}h before</div>` : ''}
            <div class="actions">
              <button class="btn btn-primary" onclick="renewData(${plan.id})">🔄 Renew</button>
              <button class="btn btn-danger" onclick="deleteData(${plan.id})">🗑️ Delete</button>
            </div>
          </div>`;
      }).join('');
      document.getElementById('totalData').textContent = dataPlans.length;
      document.getElementById('expiringSoon').textContent = totalExpiring;
      const banner = document.getElementById('notificationBanner');
      if (totalExpiring > 0) { banner.classList.add('show'); banner.textContent = `⚠️ ${totalExpiring} data plan${totalExpiring !== 1 ? 's' : ''} expiring soon!`; }
      else { banner.classList.remove('show'); }
    }

    function addData() {
      const network = document.getElementById('network').value;
      const phone = document.getElementById('phone').value;
      const dataAmount = document.getElementById('dataAmount').value;
      const cost = document.getElementById('cost').value;
      const purchaseDate = document.getElementById('purchaseDate').value;
      const purchaseTime = document.getElementById('purchaseTime').value;
      const validity = document.getElementById('validity').value;
      const planName = document.getElementById('planName').value;
      const reminderHours = document.getElementById('reminderTime').value;
      if (!phone || !dataAmount || !validity) { alert('Please fill in all required fields!'); return; }
      dataPlans.push({ id: Date.now(), network, phone, dataAmount, cost: cost || 0, purchaseDate, purchaseTime, validity: parseInt(validity), planName, reminderHours: parseInt(reminderHours) });
      saveData();
      document.getElementById('phone').value = ''; document.getElementById('dataAmount').value = ''; document.getElementById('cost').value = ''; document.getElementById('planName').value = '';
      showTab('list');
    }

    function deleteData(id) { if (confirm('Are you sure you want to delete this data plan?')) { dataPlans = dataPlans.filter(p => p.id !== id); saveData(); } }
    function renewData(id) { const plan = dataPlans.find(p => p.id === id); if (plan) { plan.purchaseDate = new Date().toISOString().split('T')[0]; const h = String(new Date().getHours()).padStart(2,'0'); const m = String(new Date().getMinutes()).padStart(2,'0'); plan.purchaseTime = `${h}:${m}`; saveData(); alert('📱 Data renewed! Time updated to now.'); } }
    function showTab(tab) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab')[tab === 'list' ? 0 : 1].classList.add('active'); document.getElementById('listView').style.display = tab === 'list' ? 'block' : 'none'; document.getElementById('addView').classList.toggle('active', tab === 'add'); }
    renderList();
    setInterval(renderList, 60000);
  </script>
</body>
</html>
